<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>恢恢小屋 - 小类的个人网站</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            min-height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px 36px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-2px); }
        h1 {
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 32px;
            letter-spacing: 2px;
        }
        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 14px;
            text-align: center;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }
        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            color: #e0e0e0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .links a:hover::before { opacity: 1; }
        .links a:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            color: #fff;
        }
        .links a:active { transform: translateY(0); }
        .links a .arrow {
            font-size: 13px;
            opacity: 0.4;
            transition: opacity 0.25s ease;
        }
        .links a:hover .arrow { opacity: 0.8; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        }
        .divider span {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .footer a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s ease;
        }
        .footer a:hover { color: rgba(255,255,255,0.7); }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 32px 20px 24px; border-radius: 20px; }
            h1 { font-size: 22px; }
            .links a { padding: 12px 16px; font-size: 14px; }
        }
    </style>
</head>
